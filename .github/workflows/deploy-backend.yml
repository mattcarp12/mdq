name: Build and Push Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: 

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-west-2
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push API Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: ./backend
        run: |
          docker build --build-arg APP_NAME=api -t $ECR_REGISTRY/mdq-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/mdq-api:$IMAGE_TAG

      - name: Build and Push Worker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: ./backend
        run: |
          docker build --build-arg APP_NAME=worker -t $ECR_REGISTRY/mdq-worker:$IMAGE_TAG .
          docker push $ECR_REGISTRY/mdq-worker:$IMAGE_TAG
      
      - name: Update Kustomize Image Tags
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: ./infra/k8s/overlays/prod-eks
        run: |
          # Dynamically search the file for 'mdq-api:latest' and replace it with your ECR URL and Git SHA
          kustomize edit set image mdq-api:latest=${{ env.ECR_REGISTRY }}/mdq-api:${{ env.IMAGE_TAG }}
          kustomize edit set image mdq-worker:latest=${{ env.ECR_REGISTRY }}/mdq-worker:${{ env.IMAGE_TAG }}
          # kustomize edit set image mdq-migrator:latest=${{ env.ECR_REGISTRY }}/mdq-migrator:${{ env.IMAGE_TAG }}

      - name: Commit and Push Manifest Update
        # Community action that safely commits modified files back to your repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update EKS image tags to ${{ env.IMAGE_TAG }}"
          # Strictly limit the commit to just this file to prevent accidental pushes
          file_pattern: infra/k8s/overlays/prod-eks/kustomization.yaml