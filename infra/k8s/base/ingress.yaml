apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mdq-ingress
  annotations:
    # SOTA: Tell the AWS controller to build a real ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Send traffic directly to the Pod IPs, bypassing the Node network (faster!)
    alb.ingress.kubernetes.io/target-type: ip 
    
    # Health check path so AWS knows your API is alive
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service # Matches your API service name
                port:
                  number: 8080