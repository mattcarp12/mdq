AWSTemplateFormatVersion: '2010-09-09'
Description: 'MDQ Task Queue - API Fargate Service'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name that will be prefixed to resource names
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC to deploy into
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the ALB and Fargate Tasks
  ApiImageUrl:
    Type: String
    Description: The ECR URI of the API Docker image
  WorkerImageUrl:
    Type: String
    Description: The ECR URI of the Worker Docker image
  AlbCertificateArn:
    Type: String
    NoEcho: true
    Description: The ARN of the self-signed certificate imported into ACM
  AllowedOrigins:
    Type: String
    Description: List of allowed CORS origins for the API

Resources:
  # 1. The ECS Cluster (The logical grouping of your containers)
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-mdq-cluster
      CapacityProviders:
        - FARGATE

  # 2. Security Groups (The Firewalls)
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP from the internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound traffic from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !GetAtt AlbSecurityGroup.GroupId

  # 3. The Load Balancer (Routes traffic to your containers)
  PublicLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-mdq-api-alb
      Scheme: internet-facing
      Subnets: !Ref Subnets
      SecurityGroups:
        - !GetAtt AlbSecurityGroup.GroupId

  AlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-mdq-api-tg
      VpcId: !Ref VpcId
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-Res-PQ-2025-09 # Standard compatibility policy
      Certificates:
        - CertificateArn: !Ref AlbCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroup

  # 4. The IAM Roles (Permissions for the container)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'secretsmanager:GetSecretValue'
                Resource: 
                  Fn::ImportValue:
                    !Sub "mdq-state-${EnvironmentName}-AppSecretsArn"

  # 5. The Fargate Task Definition (How to run your specific Docker image)
  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${EnvironmentName}-mdq-api
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'    # .25 vCPU is plenty for a SOTA Go binary
      Memory: '512' # 512 MB RAM
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Ref ApiImageUrl
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            # 12-Factor: Injecting state via environment variables
            - Name: PORT
              Value: "8080"
            - Name: ALLOWED_ORIGINS
              Value: !Ref AllowedOrigins
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: 
                Fn::Sub:
                  - "${SecretArn}:JWT_SECRET::"
                  - SecretArn: 
                      Fn::ImportValue: !Sub "mdq-state-${EnvironmentName}-AppSecretsArn"
            - Name: DATABASE_URL
              ValueFrom: 
                Fn::Sub:
                  - "${SecretArn}:DATABASE_URL::"
                  - SecretArn: 
                      Fn::ImportValue: !Sub "mdq-state-${EnvironmentName}-AppSecretsArn"
            - Name: REDIS_URL
              ValueFrom: 
                Fn::Sub:
                  - "${SecretArn}:REDIS_URL::"
                  - SecretArn: 
                      Fn::ImportValue: !Sub "mdq-state-${EnvironmentName}-AppSecretsArn"

          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /ecs/${EnvironmentName}-mdq-api
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
  
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${EnvironmentName}-mdq-api
      RetentionInDays: 30 # Highly recommended so you don't pay for logs forever

  # 6. The ECS Service (Keeps the containers running and scales them)
  ApiService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: mdq-api-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref ApiTaskDefinition
      DesiredCount: 1 # Run 1 container for MVP
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !GetAtt ApiSecurityGroup.GroupId
            - Fn::ImportValue:
                Fn::Sub: "${EnvironmentName}-FargateSecurityGroupId"
          Subnets: !Ref Subnets
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 8080
          TargetGroupArn: !Ref AlbTargetGroup

# ==========================================
# THE WORKER RESOURCES
# ==========================================

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${EnvironmentName}-mdq-worker
      RetentionInDays: 30
      
  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${EnvironmentName}-mdq-worker
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Ref WorkerImageUrl
          # NO PortMappings! Workers do not listen for HTTP traffic.
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: 
                Fn::Sub:
                  - "${SecretArn}:DATABASE_URL::"
                  - SecretArn: 
                      Fn::ImportValue: !Sub "mdq-state-${EnvironmentName}-AppSecretsArn"
            - Name: REDIS_URL
              ValueFrom: 
                Fn::Sub:
                  - "${SecretArn}:REDIS_URL::"
                  - SecretArn: 
                      Fn::ImportValue: !Sub "mdq-state-${EnvironmentName}-AppSecretsArn"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /ecs/${EnvironmentName}-mdq-worker
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: mdq-worker-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref WorkerTaskDefinition
      DesiredCount: 1 # Run 1 worker container to start
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            # Workers only need outbound internet/DB access, no inbound HTTP.
            - Fn::ImportValue:
                Fn::Sub: "${EnvironmentName}-FargateSecurityGroupId"
          Subnets: !Ref Subnets
      # NO LoadBalancers array!

Outputs:
  ApiEndpoint:
    Description: The public URL of your API
    Value: !Sub "https://${PublicLoadBalancer.DNSName}"