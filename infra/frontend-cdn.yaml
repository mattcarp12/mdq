AWSTemplateFormatVersion: '2010-09-09'
Description: 'MDQ Task Queue - Frontend React SPA (S3 + CloudFront)'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  CfCertificateArn:
    Type: String
    NoEcho: true
    Description: The ARN of the ACM certificate for CloudFront (must be in us-east-1)

Resources:
  # 1. The Private Storage Bucket
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvironmentName}-mdq-frontend-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  # 2. SOTA Security: Origin Access Control (OAC)
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${EnvironmentName}-mdq-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # 3. The Global CDN
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        # CRITICAL FOR REACT ROUTER: If CloudFront doesn't find a file (like /dashboard), 
        # it returns 404. We catch that 404 and return index.html so React can handle the route.
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        ViewerCertificate:
          AcmCertificateArn: !Sub ${CfCertificateArn}
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # 4. The Bucket Policy allowing CloudFront to read the files
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution.Id}

Outputs:
  FrontendUrl:
    Description: The public URL of your React application
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  BucketName:
    Description: The S3 bucket to upload the Vite build to
    Value: !Ref FrontendBucket
  DistributionId:
    Description: CloudFront ID (used for cache invalidation during CI/CD)
    Value: !Ref CloudFrontDistribution