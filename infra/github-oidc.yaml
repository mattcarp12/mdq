AWSTemplateFormatVersion: "2010-09-09"
Description: "GitHub Actions OIDC integration for CI/CD deployments"

Parameters:
  GitHubOrg:
    Type: String
    Description: Name of GitHub organization/user
  GitHubRepo:
    Type: String
    Description: Name of GitHub repository

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 1b511abead59c6ce207077c0bf0e0043b1382612 # GitHub's OIDC thumbprint

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !Ref GitHubOidcProvider
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      Policies:
        # 1. Backend Permissions: Allow pushing to our specific ECR repositories
        - PolicyName: ECRPushAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/carpecode-task-queue-*
        
        # 2. Frontend Permissions: Allow syncing to S3 and invalidating the CloudFront cache
        - PolicyName: FrontendDeploymentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                # SOTA: We restrict this to buckets containing "mdq-frontend" in the name
                Resource:
                  - !Sub arn:aws:s3:::*-mdq-frontend-*
                  - !Sub arn:aws:s3:::*-mdq-frontend-*/*
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/*
        
        # 3. Infrastructure Permissions: Allow pipeline to query CloudFormation outputs
        - PolicyName: CloudFormationReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*mdq*/*

        # 4. Backend Permission: Allow running ECS tasks for database migrations
        - PolicyName: ECSDeploymentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Allow GitHub to run tasks, describe them, and update the main service
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:RunTask
                  - ecs:DescribeTasks
                Resource:
                  - !Sub arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/*mdq*
                  - !Sub arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/*mdq*/*
                  - !Sub arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*mdq*
                  - !Sub arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task/*mdq*/*
              # Allow GitHub to fetch the VPC configuration required for the run-task command
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                Resource: "*"
              # The crucial fix: Allow passing IAM roles strictly to ECS tasks
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/*
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

Outputs:
  RoleArn:
    Description: The ARN of the IAM role to use in GitHub Actions
    Value: !GetAtt GitHubActionsRole.Arn
